<app-page-header>Writable Signal</app-page-header>
<mat-chip-set>
  <mat-chip>
    <img
      matChipAvatar
      ngSrc="/images/faces/face-1.png"
      [fill]="true"
      alt="person"
      class="object-cover"
    />
    {{ name() }}
  </mat-chip>
  <mat-chip>{{ age() }}</mat-chip>
</mat-chip-set>

<div class="mt-5 space-x-2">
  <button matButton="filled" (click)="resetAge()">Reset Age</button>
  <button matButton="filled" (click)="increaseAge()">Increase Age</button>
</div>
