<app-page-header>Test Page</app-page-header>
<div class="relative">
  <button
    class="fixed right-10 bottom-10 flex size-12 cursor-pointer items-center justify-center rounded-full bg-blue-100"
    (click)="isOpen = !isOpen"
    type="button"
    cdkOverlayOrigin
    #origin="cdkOverlayOrigin"
  >
    <svg lucideCircleQuestionMark size="25" class="stroke-blue-900" />
  </button>
</div>
<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="origin"
  [cdkConnectedOverlayOpen]="isOpen"
  (detach)="isOpen = false"
  [cdkConnectedOverlayOffsetY]="-10"
>
  <div
    class="rounded-radius relative size-120 scrollbar-thin scrollbar-thumb-blue-100 overflow-auto shadow-2xl shadow-gray-300"
  >
    <div class="fixed inset-x-0 top-0 rounded-t-lg bg-blue-100 p-3">
      <h4>How can I help you?</h4>
    </div>
    <div class="mt-15 mb-25 space-y-5 p-3">
      @for (message of messages(); track $index) {
        @if (message.from === 'user') {
          <div class="flex justify-end">
            <div class="w-4/5 rounded-lg bg-sky-100 p-5">
              <p class="text-sm">
                {{ message.message }}
              </p>
            </div>
          </div>
        } @else {
          <div class="flex justify-start">
            <div class="w-4/5 rounded-lg bg-gray-100 p-5">
              <p class="text-sm">
                {{ message.message }}
              </p>
            </div>
          </div>
        }
      }
    </div>
    <div class="fixed inset-x-0 bottom-0 flex w-full items-center gap-5 p-5">
      <div class="message-box rounded-radius w-full bg-gray-300/20 backdrop-blur-2xl">
        <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
          <input matInput type="text" [(ngModel)]="userMessage" [disabled]="isLoading()" />
        </mat-form-field>
      </div>
      <div>
        <button
          class="flex size-12 cursor-pointer items-center justify-center rounded-full bg-blue-500"
          (click)="send()"
          matRipple
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <mat-spinner diameter="20" />
          } @else {
            <svg lucideSendHorizonal size="20" class="stroke-blue-50" />
          }
        </button>
      </div>
    </div>
  </div>
</ng-template>
